<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terumo Hub | Gestión de Laboratorio</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <header>
            <h1 id="mainTitle">Sistema de Gestión de Laboratorio</h1>
            <p class="subtitle" id="mainSubtitle">Selecciona una categoría para comenzar</p>
        </header>

        <!-- Navegación "Atrás" -->
        <div id="backNav" class="back-nav hidden">
            <button onclick="router.home()" class="btn-back">← Volver al Inicio</button>
        </div>

        <main id="hubContent" class="hub-grid fade-in">
            <!-- El contenido se genera dinámicamente -->
        </main>

        <footer>
            <p>&copy; 2026 Terumo Gestión Técnica | Alta Precisión & Trazabilidad</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
